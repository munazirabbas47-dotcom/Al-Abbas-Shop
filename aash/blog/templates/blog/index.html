{%extends 'blog/basic.html'%}

{%block body%}
<div class="container mt-3">
  <div class="row my-2">
    {% for item in myposts %}
    <div class="col-md-6">
      <div class="row no-gutters border rounded overflow-hidden flex-md-row mb-4 shadow-sm h-md-250 position-relative">
        <div class="col p-4 d-flex flex-column position-static">
          <strong class="d-inline-block mb-2 text-primary">{{item.head0|slice:"3:"}}</strong>
          <h3 class="mb-0">{{item.title|slice:"0:50"}}</h3>
          <div class="mb-1 text-muted">{{item.publish_date}}</div>
          <p class="card-text mb-auto">{{item.chead0|slice:"0:120"}}...</p>
          <a href="/blog/blogpost/{{item.post_id}}" class="stretched-link">Continue reading</a>
        </div>
        <div class="col-auto d-none d-lg-block">
          <img src="/media/{{item.thumbnail}}" class="bd-placeholder-img" width="230" height="350"
            aria-label="Placeholder: Thumbnail">
          <title>Placeholder</title>
          </img>
        </div>
      </div>
      {% if forloop.counter|divisibleby:2 %}
    </div>
    <div class="row my-2">
      {%endif%}
    </div>
    {% endfor %}
  </div>
</div>
{%endblock%}
